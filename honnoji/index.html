<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0d0b09;
    overscroll-behavior:none;touch-action:manipulation;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  #wrap{position:fixed;inset:0;width:100%;height:100dvh;overflow:hidden;
    font-family:'Yu Mincho','Hiragino Mincho ProN','Shippori Mincho',serif;user-select:none;
    -webkit-user-select:none}
  #c{display:block;width:100%;height:100%;background:#0d0b09}
  #hud{position:absolute;top:max(14px,env(safe-area-inset-top));left:16px;right:16px;
    display:flex;justify-content:space-between;
    align-items:flex-start;pointer-events:none;color:#E8DFC8;text-shadow:0 2px 8px rgba(0,0,0,.7)}
  #dist{font-size:clamp(22px,4.5vmin,34px);letter-spacing:.06em;font-weight:600}
  #dist span{font-size:.6em;opacity:.75;margin-left:.1em}
  #kills{font-size:clamp(12px,2.6vmin,17px);color:#C9A227;letter-spacing:.08em;margin-top:.15em;min-height:1.2em}
  #best{font-size:clamp(12px,2.4vmin,16px);color:#C9A227;letter-spacing:.08em;opacity:.85;margin-top:.4em;text-align:right}
  #place{position:absolute;top:38%;left:0;right:0;text-align:center;
    color:rgba(232,223,200,0);font-size:clamp(24px,6vmin,42px);letter-spacing:.35em;
    transition:color .5s;pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.8)}
  #place.show{color:rgba(232,223,200,.9)}
  #skill{position:absolute;left:18px;bottom:max(22px,env(safe-area-inset-bottom));
    width:clamp(68px,17vmin,88px);height:clamp(68px,17vmin,88px);border-radius:50%;
    border:2px solid #C9A227;background:rgba(13,11,9,.6);color:#E8DFC8;
    font-family:inherit;font-size:clamp(14px,3.4vmin,18px);letter-spacing:.06em;line-height:1.3;
    display:none;align-items:center;justify-content:center;text-align:center;
    z-index:6;cursor:pointer;text-shadow:0 1px 6px rgba(0,0,0,.8)}
  #skill.ready{animation:pulse 1.5s infinite}
  #skill.cd{border-color:rgba(201,162,39,.28);color:rgba(232,223,200,.4);background:rgba(13,11,9,.42)}
  #skill.armed{background:rgba(201,162,39,.3);border-color:#E8DFC8;animation:none}
  @keyframes pulse{0%,100%{box-shadow:0 0 2px rgba(201,162,39,.15)}50%{box-shadow:0 0 20px rgba(201,162,39,.6)}}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;padding:24px;z-index:10;
    background:radial-gradient(ellipse 70% 60% at 50% 46%,rgba(13,11,9,.55),rgba(13,11,9,.92));
    color:#E8DFC8;text-align:center;transition:opacity .4s}
  #overlay.hide{opacity:0;pointer-events:none}
  #ttl{font-size:clamp(32px,9vmin,60px);letter-spacing:.18em;color:#E8DFC8;
    border-bottom:2px solid #C9A227;padding-bottom:.12em;text-shadow:0 3px 14px rgba(0,0,0,.7);
    white-space:nowrap}
  #sub{font-size:clamp(14px,3vmin,20px);line-height:1.9;color:rgba(232,223,200,.82);letter-spacing:.05em}
  .btn{background:none;color:#E8DFC8;border:1.5px solid #B3402A;
    padding:.6em 2em;font-family:inherit;font-size:clamp(16px,3.2vmin,21px);letter-spacing:.2em;
    border-radius:4px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .btn:hover{background:#B3402A;color:#0d0b09;box-shadow:0 0 24px rgba(179,64,42,.5)}
  .btn.gold{border-color:#C9A227;letter-spacing:.08em;font-size:clamp(13px,2.6vmin,17px);padding:.55em 1.6em}
  .btn.gold:hover{background:#C9A227;color:#0d0b09;box-shadow:0 0 24px rgba(201,162,39,.45)}
  #actions{display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:4px}
  #actions.hidden{display:none}
  #credit{position:absolute;bottom:max(10px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;
    pointer-events:none;color:rgba(232,223,200,.45);font-size:clamp(10px,2vmin,13px);letter-spacing:.25em}
</style>

<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div>
      <div id="dist">0 <span>歩</span></div>
      <div id="kills"></div>
    </div>
    <div id="best">最高 0</div>
  </div>
  <div id="place">亀山、発つ</div>
  <button id="skill">時は今</button>
  <div id="overlay">
    <div id="ttl">本能寺への道</div>
    <div id="sub">右タップで跳ぶ ─ 篝火を越えよ<br>左タップで斬る ─ 敵を討て<br>秘技「時は今」で空中三段跳び ─ 千歩先の本能寺へ</div>
    <button id="btn" class="btn">駆け出す</button>
    <div id="actions" class="hidden">
      <a id="shareX" class="btn gold" target="_blank" rel="noopener">Xで戦果を伝える</a>
      <a id="ytLink" class="btn gold" href="https://www.youtube.com/@Cinema_emaki" target="_blank" rel="noopener">絵巻の本編を観る</a>
    </div>
  </div>
  <div id="credit">シネマ絵巻 ─ 戦国武将の生涯を、60秒の絵巻に</div>
</div>

<script>
(function(){
  const PAGE_URL='https://kaminavi-jp.github.io/cinema-emaki-games/honnoji/';
  const cv=document.getElementById('c'), wrap=document.getElementById('wrap');
  const ov=document.getElementById('overlay'), btn=document.getElementById('btn');
  const distEl=document.getElementById('dist'), bestEl=document.getElementById('best'),
        ttl=document.getElementById('ttl'), sub=document.getElementById('sub'),
        placeEl=document.getElementById('place'), actions=document.getElementById('actions'),
        shareX=document.getElementById('shareX'), killsEl=document.getElementById('kills'),
        skillEl=document.getElementById('skill');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let ctx, W=0, H=0, ground=0, dpr=1;
  const MINCHO='"Yu Mincho","Hiragino Mincho ProN",serif';

  function setup(){
    dpr=Math.min(devicePixelRatio||1,2);
    const r=cv.getBoundingClientRect(); W=r.width; H=r.height;
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
    ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    ground=H*0.80;
  }
  let rz; addEventListener('resize',()=>{clearTimeout(rz);rz=setTimeout(()=>{setup();if(player.onGround)player.y=ground;},120)});

  // ---- スプライト(ちび光秀+流用の敵) ----
  const SPR={};
  for(const[k,src]of Object.entries({runA:'img/mitsu_runA.png',runB:'img/mitsu_runB.png',
    jump:'img/mitsu_jump.png',dead:'img/mitsu_dead.png',slash:'img/mitsu_slash.png',
    eYari:'img/enemy_yari.png',eKatana:'img/enemy_katana.png'})){
    const im=new Image(); im.src=src; SPR[k]=im;
  }
  function imgOk(im){return im&&im.naturalWidth>0}
  const PH=96, EH=86;           // 表示高さ(CSS px)

  // ---- state ----
  let state='ready', dist=0, best=0, speed=0, baseSpeed=300, t=0, shake=0;
  const player={x:0,y:0,vy:0,r:20,onGround:true,legT:0};
  let obstacles=[], embers=[], mist=[], parts=[], floats=[], spawnT=0;
  let kills=0, combo=0, comboT=0, freezeT=0;
  const G=2100, JUMP=-760, GOAL=1000, KESSEN=800;
  const SKILL_CD=22;
  let skillCD=0, charges=0;
  const SLASH_DUR=.26, SLASH_CDT=.38, SLASH_REACH=70;
  let slashT=-1, slashCD=0, zoneHintT=0;
  const places=['亀山、発つ','老ノ坂を越える','桂川を渡る','夜が、白む','本能寺は、目前'];
  const placeAt=[0,220,440,660,KESSEN];
  let placeIdx=-1, placeTimer=0, pressBuf=-1e9;

  // ---- 計測(GoatCounter)。本番ホスト以外では送らない ----
  const GC=location.hostname==='kaminavi-jp.github.io'?'https://cinema-emaki.goatcounter.com/count':'';
  function track(ev){ if(!GC) return; try{ new Image().src=GC+'?p='+encodeURIComponent('/honnoji/'+ev)+'&r='+Date.now(); }catch(e){} }
  async function gcCount(path){
    try{
      const r=await fetch('https://cinema-emaki.goatcounter.com/counter/'+path+'.json');
      if(!r.ok) return null;
      const n=parseInt(String((await r.json()).count).replace(/[^0-9]/g,''),10);
      return isNaN(n)?null:n;
    }catch(e){ return null; }
  }
  async function showOdds(cleared){
    const[runs,clears]=await Promise.all([gcCount('/honnoji/run'),gcCount('/honnoji/clear')]);
    if(runs===null||clears===null||runs<5) return;
    if(state!=='over'&&state!=='clear') return;
    const line=cleared
      ?'本能寺の変 成功率 '+((clears/runs*100)<0.1?(clears/runs*100).toFixed(2):(clears/runs*100).toFixed(1))+'%'
      :'これまで'+runs.toLocaleString('ja-JP')+'度の夜駆けで、本能寺に至った者 '+clears.toLocaleString('ja-JP')+'人';
    sub.innerHTML+='<br><span style="opacity:.65;font-size:.82em">'+line+'</span>';
  }
  function rankOf(s){ return s>=GOAL?'本能寺一番槍':s>=KESSEN?'本能寺を目前にせし者':s>=660?'夜明けを見し者':s>=440?'桂川を渡りし者':s>=220?'老ノ坂を越えし者':'亀山の霧に散りし者'; }

  try{ best=parseInt(localStorage.getItem('honnoji_best'))||0; }catch(e){}
  bestEl.textContent='最高 '+best;

  // ---- 音(WebAudio生成音・素材なし) ----
  let AC=null;
  function audioUnlock(){
    if(!AC){ try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(AC&&AC.state==='suspended') AC.resume();
  }
  function tone(f0,f1,dur,type,vol){
    if(!AC) return;
    try{
      const t0=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();
      o.type=type; o.frequency.setValueAtTime(f0,t0);
      o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t0+dur);
      g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(.001,t0+dur);
      o.connect(g).connect(AC.destination); o.start(t0); o.stop(t0+dur+.02);
    }catch(e){}
  }
  const sfx={
    jump:()=>tone(320,600,.11,'square',.035),
    air:()=>tone(520,940,.12,'square',.045),
    stomp:()=>tone(230,80,.12,'square',.08),
    death:()=>tone(170,45,.6,'sawtooth',.1),
    skill:()=>{tone(660,660,.09,'triangle',.07);setTimeout(()=>tone(880,880,.09,'triangle',.07),80);
      setTimeout(()=>tone(1174,1568,.3,'triangle',.08),160)},
    clear:()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,f,.35,'triangle',.08),i*140))},
    slash:()=>tone(1400,300,.09,'sawtooth',.035),
    kill:()=>{tone(260,90,.11,'square',.09);setTimeout(()=>tone(1568,1568,.07,'triangle',.05),40)}
  };

  // ---- パーティクル/浮き文字 ----
  function burst(x,y,n,color,spd,r){
    if(reduce) n=Math.ceil(n/3);
    for(let i=0;i<n;i++){const a=Math.random()*6.283,v=spd*(.4+Math.random()*.9);
      parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-70,life:.32+Math.random()*.3,t:0,color,r:r*(.6+Math.random()*.8)});}
  }
  function float(x,y,txt,size,color,life,vy){
    floats.push({x,y,txt,size,color,t:0,life:life||0.9,vy:vy===undefined?-42:vy});
  }

  function reset(){
    dist=0; speed=baseSpeed; t=0; shake=0; obstacles=[]; embers=[]; parts=[]; floats=[];
    spawnT=.6; pressBuf=-1e9; kills=0; combo=0; comboT=0; freezeT=0; skillCD=0; charges=0;
    slashT=-1; slashCD=0; zoneHintT=6;
    player.x=Math.min(W*0.24,180); player.y=ground; player.vy=0; player.onGround=true; player.legT=0;
    placeIdx=-1; placeTimer=0; placeEl.classList.remove('show');
    killsEl.textContent='';
    if(mist.length===0) for(let i=0;i<(reduce?6:16);i++)
      mist.push({x:Math.random()*W,y:H*(.35+Math.random()*.4),s:8+Math.random()*22,v:20+Math.random()*30,a:.03+Math.random()*.05});
  }
  function start(){ reset(); state='play'; ov.classList.add('hide'); actions.classList.add('hidden');
    skillEl.style.display='flex'; updateSkillBtn(); track('run'); }
  function endRun(clear){
    if(state!=='play') return;
    state=clear?'clear':'over'; shake=clear?0:14;
    skillEl.style.display='none';
    if(clear) sfx.clear(); else sfx.death();
    const score=Math.floor(dist);
    const newBest=score>best&&score>0;
    best=Math.max(best,score);
    try{ localStorage.setItem('honnoji_best',best); }catch(e){}
    bestEl.textContent='最高 '+best;
    const rk=rankOf(score);
    const uchitori=kills>0?kills+'人討ち取り、':'';
    let text;
    if(clear){
      ttl.textContent='敵は本能寺にあり'; ttl.style.color='#C9A227'; ttl.style.borderColor='#C9A227';
      sub.innerHTML='千歩の夜を、駆け抜けた ─ 討取 '+kills+'<br>位階「'+rk+'」';
      btn.textContent='もう一度駆ける';
      text='「本能寺への道」— 千歩を駆け抜け、'+uchitori+'本能寺に到達。位階「'+rk+'」。\n是非に及ばず、とは言わせない。\n#本能寺の変 #シネマ絵巻 #本能寺への道';
      track('clear');
    }else{
      ttl.textContent='是非に及ばず'; ttl.style.color='#B3402A'; ttl.style.borderColor='#B3402A';
      sub.innerHTML=score+' 歩 進んだ ─ 位階「'+rk+'」'+(kills>0?' ─ 討取 '+kills:'')+'<br>'+
        (newBest?'<span style="color:#C9A227">最高記録、更新</span><br>':'')+
        '本能寺まで、あと'+(GOAL-score)+'歩';
      btn.textContent='再び駆ける';
      text='「本能寺への道」— '+score+'歩、'+uchitori+'夜を駆けて力尽きた。位階「'+rk+'」。\n本能寺まで、あと'+(GOAL-score)+'歩だった。\n#本能寺の変 #シネマ絵巻 #本能寺への道';
      track('over');
    }
    shareX.href='https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(PAGE_URL);
    actions.classList.remove('hidden');
    ov.classList.remove('hide');
    showOdds(clear);
  }

  // ---- 入力 ----
  function jump(){
    if(state==='play'){
      if(player.onGround){ player.vy=JUMP; player.onGround=false; sfx.jump(); }
      else if(charges>0){ charges--; player.vy=JUMP*0.92; sfx.air();
        burst(player.x,player.y,8,'#C9A227',150,2.6);
        updateSkillBtn();
      }
      else pressBuf=t;
    }
    else if(!ov.classList.contains('hide')&&state!=='ready'){ /* 結果画面はボタンで再開 */ }
    else start();
  }
  function slash(){
    if(state!=='play'){ jump(); return; }
    if(slashCD>0) return;
    slashT=SLASH_DUR; slashCD=SLASH_CDT;
    sfx.slash();
  }
  function useSkill(){
    if(state!=='play'||skillCD>0||charges>0) return;
    charges=3; skillCD=SKILL_CD;
    sfx.skill(); shake=Math.max(shake,3);
    float(W/2,H*0.30,'時は今――',Math.min(W,H)*0.075,'#C9A227',1.6,-14);
    burst(player.x,player.y-PH*0.5,18,'#7FB4D8',220,3);
    burst(player.x,player.y-PH*0.5,10,'#C9A227',180,2.6);
    updateSkillBtn();
  }
  function updateSkillBtn(){
    if(charges>0){ skillEl.className='armed'; skillEl.innerHTML='残 '+'◆'.repeat(charges); }
    else if(skillCD>0){ skillEl.className='cd'; skillEl.textContent=Math.ceil(skillCD); }
    else{ skillEl.className='ready'; skillEl.textContent='時は今'; }
  }
  btn.addEventListener('click',e=>{e.stopPropagation();audioUnlock();start();});
  actions.addEventListener('pointerdown',e=>e.stopPropagation());
  actions.addEventListener('click',e=>e.stopPropagation());
  shareX.addEventListener('click',()=>track('share'));
  document.getElementById('ytLink').addEventListener('click',()=>track('youtube'));
  skillEl.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();audioUnlock();useSkill();});
  wrap.addEventListener('pointerdown',e=>{e.preventDefault();audioUnlock();
    if(state==='play'&&e.clientX<innerWidth/2) slash(); else jump();});
  addEventListener('keydown',e=>{
    if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();audioUnlock();jump();}
    if(e.code==='KeyZ'){e.preventDefault();audioUnlock();slash();}
    if(e.code==='KeyX'||e.code==='Enter'){e.preventDefault();audioUnlock();useSkill();}
  });

  // ---- 生成 ----
  function killEnemy(o){
    const ox=o.x, oy=ground-o.h;
    o.dead=true; o.dy=0; o.da=1;
    kills++; killsEl.textContent='討取 '+kills;
    freezeT=.045; shake=Math.max(shake,3); sfx.kill();
    burst(ox+o.w/2,oy+14,10,'#1a140e',240,3.2);
    burst(ox+o.w/2,oy+14,5,'#B3402A',180,2.8);
    if(comboT>0) combo++; else combo=1;
    comboT=1.6;
    if(combo>=2) float(ox+o.w/2,oy-38,combo+'連討ち！',24,'#B3402A',1);
    else float(ox+o.w/2,oy-24,'討取！',20,'#B3402A',.8);
  }

  function spawn(){
    const x=W+60, r=Math.random(), kessen=dist>=KESSEN;
    let type;
    if(dist<160) type='b';
    else if(dist<500) type=r<.55?'b':'e';
    else type=r<.42?'b':'e';
    if(type==='b'){
      const h=kessen?36+Math.random()*28:26+Math.random()*22;
      obstacles.push({type:'b',x,w:16+Math.random()*10,h,fire:0});
      if(kessen&&Math.random()<.14)
        obstacles.push({type:'b',x:x+104,w:16+Math.random()*10,h:34+Math.random()*22,fire:0});
    }else{
      const kind=dist>=500&&Math.random()<(kessen?.6:.4)?'katana':'yari';
      obstacles.push({type:'e',kind,x,w:26,h:58});
      if(dist>=500&&Math.random()<(kessen?.30:.18))
        obstacles.push({type:'e',kind:Math.random()<.5?'katana':'yari',x:x+92,w:26,h:58});
    }
  }

  // ---- 更新 ----
  function update(dt){
    if(freezeT>0){ freezeT-=dt; return; }   // ヒットストップ
    t+=dt;
    if(skillCD>0&&state==='play'){ skillCD-=dt; if(skillCD<=0){skillCD=0;} updateSkillBtn(); }
    if(comboT>0){ comboT-=dt; if(comboT<=0) combo=0; }
    if(state==='play'){
      speed+=dt*7;
      dist+=speed*dt/26;
      if(dist>=GOAL){ dist=GOAL; endRun(true); }
      let idx=0; for(let i=0;i<placeAt.length;i++) if(dist>=placeAt[i]) idx=i;
      if(idx!==placeIdx){ placeIdx=idx; placeEl.textContent=places[idx];
        placeEl.classList.add('show'); placeTimer=2.2; }
      if(placeTimer>0){ placeTimer-=dt; if(placeTimer<=0) placeEl.classList.remove('show'); }
      // player physics
      const wasAir=!player.onGround;
      player.vy+=G*dt; player.y+=player.vy*dt;
      if(player.y>=ground){
        if(wasAir&&player.vy>380&&!reduce)  // 着地の土煙
          for(let i=0;i<5;i++)parts.push({x:player.x-8+Math.random()*16,y:ground-2,
            vx:-50-Math.random()*70,vy:-30-Math.random()*50,life:.3,t:0,color:'#5d554a',r:2.6});
        player.y=ground; player.vy=0; player.onGround=true;
        if(t-pressBuf<=0.12){ pressBuf=-1e9; player.vy=JUMP; player.onGround=false; sfx.jump(); }
      }
      if(player.onGround) player.legT+=dt*speed*0.03;
      // spawn
      spawnT-=dt;
      if(spawnT<=0){ spawn();
        spawnT = dist>=KESSEN ? .54+Math.random()*.22
                              : Math.max(.60,1.32-speed*0.0011)+Math.random()*.35; }
      // obstacles move
      const eSpd=dist>=KESSEN?58:46;   // 決戦ゾーンの敵は突進が速い
      for(const o of obstacles){
        o.x-=(speed+(o.type==='e'&&!o.dead?eSpd:0))*dt;
        if(o.type==='b') o.fire=Math.min(1,o.fire+dt*4);
        if(o.dead){ o.dy=(o.dy||0)+320*dt; o.da=(o.da===undefined?1:o.da)-2.4*dt; }
      }
      obstacles=obstacles.filter(o=>o.x+o.w>-30&&(o.da===undefined||o.da>0));
      // 斬撃(発動後0.02〜0.16秒が刃の出ている時間)
      zoneHintT-=dt;
      if(slashCD>0) slashCD-=dt;
      if(slashT>=0){
        slashT-=dt;
        const el=SLASH_DUR-slashT;
        if(el>=0.02&&el<=0.16){
          for(const o of obstacles){
            if(o.dead||o.type!=='e') continue;
            const ox=o.x, oy=ground-o.h;
            if(ox<player.x+SLASH_REACH && ox+o.w>player.x+4 &&
               player.y>oy-24 && player.y-54<ground){
              killEnemy(o);
            }
          }
        }
      }
      // collision
      const px=player.x-13, pw=26, py=player.y-54, ph=54;
      for(const o of obstacles){
        if(o.dead) continue;
        const ox=o.x, oy=ground-o.h;
        if(px<ox+o.w-3 && px+pw>ox+3 && py+ph>oy+4){ endRun(false); break; }
      }
      // embers
      if(!reduce) for(const o of obstacles){
        if(o.type==='b'&&o.x>-20&&o.x<W&&Math.random()<0.5)
          embers.push({x:o.x+o.w/2,y:ground-o.h,vx:-speed*.3+(Math.random()-.5)*30,
            vy:-40-Math.random()*60,life:1,r:1+Math.random()*2});
      }
    }
    if(shake>0) shake=Math.max(0,shake-dt*40);
    for(const m of mist){ m.x-=m.v*dt*(state==='play'?1.6:.5); if(m.x<-60){m.x=W+40;m.y=H*(.35+Math.random()*.4);} }
    for(const e of embers){ e.x+=e.vx*dt; e.y+=e.vy*dt; e.vy+=90*dt; e.life-=dt*1.1; }
    embers=embers.filter(e=>e.life>0);
    for(const p of parts){ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=900*dt; }
    parts=parts.filter(p=>p.t<p.life);
    for(const f of floats){ f.t+=dt; f.y+=f.vy*dt; }
    floats=floats.filter(f=>f.t<f.life);
  }

  // ---- 描画 ----
  function draw(){
    ctx.save();
    if(shake>0) ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0b0a0d'); g.addColorStop(.55,'#141019'); g.addColorStop(1,'#1a1512');
    ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
    const prog=Math.min(1,dist/GOAL);
    const fg=ctx.createRadialGradient(W*0.9,ground,10,W*0.9,ground,W*(0.45+0.35*prog));
    fg.addColorStop(0,'rgba(179,64,42,'+(0.3+0.42*prog).toFixed(2)+')'); fg.addColorStop(1,'rgba(179,64,42,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
    const mx=W*0.82,my=H*0.2,mr=Math.min(W,H)*0.075;
    ctx.save(); ctx.fillStyle='#C9A227'; ctx.shadowColor='rgba(201,162,39,.6)'; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.arc(mx,my,mr,0,7); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#0f0c14';
    ctx.beginPath(); ctx.arc(mx+mr*0.42,my-mr*0.28,mr*0.95,0,7); ctx.fill(); ctx.restore();
    function ridge(base,amp,col,seed){ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,H);
      for(let x=0;x<=W;x+=40){ const y=base+Math.sin(x*0.008+seed)*amp+Math.sin(x*0.021+seed*2)*amp*0.4; ctx.lineTo(x,y);}
      ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); }
    ridge(H*0.5,26,'#181420',1.2); ridge(H*0.6,34,'#211a24',3.1);
    for(const m of mist){ ctx.fillStyle='rgba(232,223,200,'+m.a+')'; ctx.beginPath();
      ctx.ellipse(m.x,m.y,m.s*2.4,m.s,0,0,7); ctx.fill(); }
    ctx.fillStyle='#0a0908'; ctx.fillRect(-20,ground,W+40,H-ground+20);
    ctx.strokeStyle='rgba(201,162,39,.22)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,ground+.5); ctx.lineTo(W,ground+.5); ctx.stroke();
    const ap=(dist-940)/(GOAL-940);
    if(ap>0) drawTemple(W-Math.min(1,ap)*W*0.24,ground);
    // obstacles
    for(const o of obstacles){
      if(o.type==='b') drawBrazier(o);
      else drawEnemy(o);
    }
    for(const e of embers){ ctx.fillStyle='rgba(201,162,39,'+Math.max(0,e.life)+')';
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,7); ctx.fill(); }
    drawPlayer();
    // 操作ゾーンのガイド(走り始めの数秒だけ)
    if(state==='play'&&zoneHintT>0){
      const a=Math.min(1,zoneHintT/2)*0.4;
      ctx.save(); ctx.strokeStyle='rgba(232,223,200,'+(a*.5).toFixed(2)+')';
      ctx.setLineDash([6,8]); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(W/2,H*0.58); ctx.lineTo(W/2,H*0.94); ctx.stroke();
      ctx.setLineDash([]);
      ctx.font='600 '+Math.min(W,H)*0.045+'px '+MINCHO;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(179,64,42,'+a+')';
      ctx.fillText('斬る',W*0.25,H*0.70);
      ctx.fillStyle='rgba(232,223,200,'+a+')';
      ctx.fillText('跳ぶ',W*0.75,H*0.70);
      ctx.restore();
    }
    // パーティクル
    for(const p of parts){ ctx.globalAlpha=Math.max(0,1-p.t/p.life); ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
    // 浮き文字
    for(const f of floats){
      ctx.save(); ctx.globalAlpha=Math.max(0,1-f.t/f.life);
      ctx.font='600 '+f.size+'px '+MINCHO; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=8;
      ctx.fillStyle=f.color; ctx.fillText(f.txt,f.x,f.y); ctx.restore();
    }
    ctx.restore();
    distEl.firstChild.textContent=Math.floor(dist)+' ';
  }

  function drawBrazier(o){
    const ox=o.x, oy=ground-o.h;
    ctx.fillStyle='#0a0908'; ctx.fillRect(ox,oy,o.w,o.h);
    ctx.fillStyle='#1c150d'; ctx.fillRect(ox-3,oy-4,o.w+6,6);
    const fh=12+Math.sin(t*12+ox)*3;
    const fgr=ctx.createLinearGradient(0,oy-fh,0,oy);
    fgr.addColorStop(0,'rgba(201,162,39,.95)'); fgr.addColorStop(.6,'rgba(179,64,42,.9)'); fgr.addColorStop(1,'rgba(179,64,42,.2)');
    ctx.fillStyle=fgr; ctx.beginPath(); ctx.moveTo(ox-2,oy-2);
    ctx.quadraticCurveTo(ox+o.w/2,oy-fh-6,ox+o.w+2,oy-2); ctx.closePath(); ctx.fill();
  }

  function drawEnemy(o){
    const im=o.kind==='katana'?SPR.eKatana:SPR.eYari;
    const cx=o.x+o.w/2, fy=ground+(o.dead?(o.dy||0):0);
    const alpha=o.dead?Math.max(0,o.da):1;
    if(imgOk(im)){
      const h=EH, w=im.naturalWidth*h/im.naturalHeight;
      ctx.save(); ctx.translate(cx,fy);
      ctx.rotate(o.dead?1.15:Math.sin(t*9+o.x*0.02)*.055);
      ctx.globalAlpha=alpha;
      ctx.drawImage(im,-w/2,-h+Math.abs(Math.sin(t*9+o.x*0.02))*2,w,h);
      ctx.restore(); ctx.globalAlpha=1;
    }else{
      ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle='#141018';
      ctx.fillRect(o.x,ground-o.h,o.w,o.h);
      ctx.beginPath(); ctx.arc(cx,ground-o.h-8,9,0,7); ctx.fill();
      ctx.restore(); ctx.globalAlpha=1;
    }
  }

  function drawPlayer(){
    const dead=(state==='over');
    const im=dead?SPR.dead:(slashT>=0&&imgOk(SPR.slash)?SPR.slash:(!player.onGround?SPR.jump:
      (Math.floor(player.legT/Math.PI)%2===0?SPR.runA:SPR.runB)));
    // 剣閃
    if(slashT>=0&&!dead){
      const el=SLASH_DUR-slashT, k=Math.min(1,el/0.16), a=Math.max(0,1-el/SLASH_DUR);
      ctx.save(); ctx.translate(player.x+30,player.y-46);
      ctx.strokeStyle='rgba(232,223,200,'+(a*.9).toFixed(2)+')'; ctx.lineWidth=5; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0,0,42,-1.25+k*1.15,-0.75+k*1.5); ctx.stroke();
      ctx.strokeStyle='rgba(201,162,39,'+(a*.6).toFixed(2)+')'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,50,-1.2+k*1.15,-0.8+k*1.5); ctx.stroke();
      ctx.restore();
    }
    // 「時は今」発動中の桔梗の残光
    if(charges>0&&!dead){
      const gl=ctx.createRadialGradient(player.x,player.y-PH*0.5,4,player.x,player.y-PH*0.5,PH*0.75);
      gl.addColorStop(0,'rgba(127,180,216,.30)'); gl.addColorStop(1,'rgba(127,180,216,0)');
      ctx.fillStyle=gl;
      ctx.fillRect(player.x-PH,player.y-PH*1.6,PH*2,PH*1.9);
    }
    if(imgOk(im)){
      const h=dead?PH*0.82:PH, w=im.naturalWidth*h/im.naturalHeight;
      ctx.drawImage(im,player.x-w/2,player.y-h,w,h);
    }else{
      drawSamuraiVec(player.x,player.y);   // 読み込み前フォールバック
    }
  }

  function drawSamuraiVec(x,y){
    const r=player.r, run=player.onGround?Math.sin(player.legT):0.2, air=!player.onGround;
    ctx.save(); ctx.translate(x,y);
    ctx.lineWidth=6; ctx.strokeStyle='#070605'; ctx.lineCap='round';
    const l1=air?10:run*12, l2=air?-8:-run*12;
    ctx.beginPath(); ctx.moveTo(-2,-r*0.5); ctx.lineTo(-2+l1,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2,-r*0.5); ctx.lineTo(2+l2,0); ctx.stroke();
    ctx.fillStyle='#070605'; ctx.beginPath();
    ctx.moveTo(-r*0.5,-r*1.7); ctx.lineTo(r*0.5,-r*1.7);
    ctx.lineTo(r*0.62,-r*0.5); ctx.lineTo(-r*0.62,-r*0.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-r*2.0,r*0.42,0,7); ctx.fill();
    ctx.fillRect(-r*0.14,-r*2.65,r*0.28,r*0.4);
    ctx.restore();
  }

  function drawTemple(x,gy){
    ctx.save();
    const w=Math.min(W*0.5,230), h=w*0.6;
    const gl=ctx.createRadialGradient(x+w/2,gy-h*0.5,10,x+w/2,gy-h*0.5,w*1.2);
    gl.addColorStop(0,'rgba(201,120,40,.35)'); gl.addColorStop(1,'rgba(179,64,42,0)');
    ctx.fillStyle=gl; ctx.fillRect(x-w,gy-h*2.4,w*3,h*2.6);
    ctx.fillStyle='#0a0806';
    ctx.beginPath();
    ctx.moveTo(x-w*0.12,gy-h*0.52);
    ctx.quadraticCurveTo(x+w*0.5,gy-h*1.15,x+w*1.12,gy-h*0.52);
    ctx.lineTo(x+w*0.94,gy-h*0.44);
    ctx.quadraticCurveTo(x+w*0.5,gy-h*0.82,x+w*0.06,gy-h*0.44);
    ctx.closePath(); ctx.fill();
    ctx.fillRect(x+w*0.1,gy-h*0.46,w*0.8,h*0.46);
    ctx.fillStyle='rgba(201,120,40,.55)';
    for(let i=0;i<4;i++) ctx.fillRect(x+w*(0.16+i*0.2),gy-h*0.38,w*0.06,h*0.3);
    const f=ctx.createLinearGradient(0,gy-h*1.6,0,gy-h*0.8);
    f.addColorStop(0,'rgba(201,162,39,0)'); f.addColorStop(1,'rgba(201,162,39,.5)');
    ctx.fillStyle=f;
    ctx.beginPath();
    ctx.moveTo(x+w*0.15,gy-h*0.78);
    ctx.quadraticCurveTo(x+w*0.33,gy-h*1.5+Math.sin(t*9)*6,x+w*0.5,gy-h*0.88);
    ctx.quadraticCurveTo(x+w*0.68,gy-h*1.6+Math.cos(t*8)*6,x+w*0.85,gy-h*0.78);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  let last=0, raf;
  function frame(ts){
    raf=requestAnimationFrame(frame);
    if(!last) last=ts;
    let dt=(ts-last)/1000; last=ts; dt=Math.min(dt,0.05);
    update(dt); draw();
  }
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){ cancelAnimationFrame(raf); raf=0; last=0; }
    else if(!raf) raf=requestAnimationFrame(frame);
  });

  setup(); reset();
  raf=requestAnimationFrame(frame);
})();
</script>
</body>
