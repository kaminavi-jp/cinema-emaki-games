<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0d0b09;
    overscroll-behavior:none;touch-action:manipulation;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  #wrap{position:fixed;inset:0;width:100%;height:100dvh;overflow:hidden;
    font-family:'Yu Mincho','Hiragino Mincho ProN','Shippori Mincho',serif;user-select:none;
    -webkit-user-select:none}
  #c{display:block;width:100%;height:100%;background:#0d0b09}
  #hud{position:absolute;top:max(14px,env(safe-area-inset-top));left:16px;right:16px;
    display:flex;justify-content:space-between;
    align-items:flex-start;pointer-events:none;color:#E8DFC8;text-shadow:0 2px 8px rgba(0,0,0,.7)}
  #dist{font-size:clamp(22px,4.5vmin,34px);letter-spacing:.06em;font-weight:600}
  #dist span{font-size:.6em;opacity:.75;margin-left:.1em}
  #best{font-size:clamp(12px,2.4vmin,16px);color:#C9A227;letter-spacing:.08em;opacity:.85;margin-top:.4em;text-align:right}
  #place{position:absolute;top:38%;left:0;right:0;text-align:center;
    color:rgba(232,223,200,0);font-size:clamp(24px,6vmin,42px);letter-spacing:.35em;
    transition:color .5s;pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.8)}
  #place.show{color:rgba(232,223,200,.9)}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;padding:24px;
    background:radial-gradient(ellipse 70% 60% at 50% 46%,rgba(13,11,9,.55),rgba(13,11,9,.92));
    color:#E8DFC8;text-align:center;transition:opacity .4s}
  #overlay.hide{opacity:0;pointer-events:none}
  #ttl{font-size:clamp(32px,9vmin,60px);letter-spacing:.18em;color:#E8DFC8;
    border-bottom:2px solid #C9A227;padding-bottom:.12em;text-shadow:0 3px 14px rgba(0,0,0,.7);
    white-space:nowrap}
  #sub{font-size:clamp(14px,3vmin,20px);line-height:1.9;color:rgba(232,223,200,.82);letter-spacing:.05em}
  .btn{background:none;color:#E8DFC8;border:1.5px solid #B3402A;
    padding:.6em 2em;font-family:inherit;font-size:clamp(16px,3.2vmin,21px);letter-spacing:.2em;
    border-radius:4px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .btn:hover{background:#B3402A;color:#0d0b09;box-shadow:0 0 24px rgba(179,64,42,.5)}
  .btn.gold{border-color:#C9A227;letter-spacing:.08em;font-size:clamp(13px,2.6vmin,17px);padding:.55em 1.6em}
  .btn.gold:hover{background:#C9A227;color:#0d0b09;box-shadow:0 0 24px rgba(201,162,39,.45)}
  #actions{display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:4px}
  #actions.hidden{display:none}
  #credit{position:absolute;bottom:max(10px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;
    pointer-events:none;color:rgba(232,223,200,.45);font-size:clamp(10px,2vmin,13px);letter-spacing:.25em}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="dist">0 <span>歩</span></div>
    <div id="best">最高 0</div>
  </div>
  <div id="place">亀山、発つ</div>
  <div id="overlay">
    <div id="ttl">本能寺への道</div>
    <div id="sub">タップ / スペースで跳ぶ<br>千歩先の本能寺まで、夜を駆けよ</div>
    <button id="btn" class="btn">駆け出す</button>
    <div id="actions" class="hidden">
      <a id="shareX" class="btn gold" target="_blank" rel="noopener">Xで戦果を伝える</a>
      <a id="ytLink" class="btn gold" href="https://www.youtube.com/@Cinema_emaki" target="_blank" rel="noopener">絵巻の本編を観る</a>
    </div>
  </div>
  <div id="credit">シネマ絵巻 ─ 戦国武将の生涯を、60秒の絵巻に</div>
</div>

<script>
(function(){
  const PAGE_URL='https://kaminavi-jp.github.io/cinema-emaki-games/honnoji/';
  const cv=document.getElementById('c'), wrap=document.getElementById('wrap');
  const ov=document.getElementById('overlay'), btn=document.getElementById('btn');
  const distEl=document.getElementById('dist'), bestEl=document.getElementById('best'),
        ttl=document.getElementById('ttl'), sub=document.getElementById('sub'),
        placeEl=document.getElementById('place'), actions=document.getElementById('actions'),
        shareX=document.getElementById('shareX');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let ctx, W=0, H=0, ground=0, dpr=1;

  function setup(){
    dpr=Math.min(devicePixelRatio||1,2);
    const r=cv.getBoundingClientRect(); W=r.width; H=r.height;
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
    ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    ground=H*0.80;
  }
  let rz; addEventListener('resize',()=>{clearTimeout(rz);rz=setTimeout(()=>{setup();if(player.onGround)player.y=ground;},120)});

  // ---- state ----
  let state='ready', dist=0, best=0, speed=0, baseSpeed=300, t=0, shake=0;
  const player={x:0,y:0,vy:0,r:20,onGround:true,legT:0};
  let obstacles=[], embers=[], mist=[], spawnT=0;
  const G=2100, JUMP=-760, GOAL=1000, KESSEN=800;
  const places=['亀山、発つ','老ノ坂を越える','桂川を渡る','夜が、白む','本能寺は、目前'];
  const placeAt=[0,220,440,660,KESSEN];
  let placeIdx=-1, placeTimer=0, pressBuf=-1e9;
  // 計測(GoatCounter)。本番ホスト以外では送らない(テストで数字を汚さない)
  const GC=location.hostname==='kaminavi-jp.github.io'?'https://cinema-emaki.goatcounter.com/count':'';
  function track(ev){ if(!GC) return; try{ new Image().src=GC+'?p='+encodeURIComponent('/honnoji/'+ev)+'&r='+Date.now(); }catch(e){} }
  async function gcCount(path){
    try{
      const r=await fetch('https://cinema-emaki.goatcounter.com/counter/'+path+'.json');
      if(!r.ok) return null;
      const n=parseInt(String((await r.json()).count).replace(/[^0-9]/g,''),10);
      return isNaN(n)?null:n;
    }catch(e){ return null; }
  }
  async function showOdds(cleared){
    const[runs,clears]=await Promise.all([gcCount('/honnoji/run'),gcCount('/honnoji/clear')]);
    if(runs===null||clears===null||runs<5) return;
    if(state!=='over'&&state!=='clear') return;
    const line=cleared
      ?'本能寺の変 成功率 '+((clears/runs*100)<0.1?(clears/runs*100).toFixed(2):(clears/runs*100).toFixed(1))+'%'
      :'これまで'+runs.toLocaleString('ja-JP')+'度の夜駆けで、本能寺に至った者 '+clears.toLocaleString('ja-JP')+'人';
    sub.innerHTML+='<br><span style="opacity:.65;font-size:.82em">'+line+'</span>';
  }
  function rankOf(s){ return s>=GOAL?'本能寺一番槍':s>=KESSEN?'本能寺を目前にせし者':s>=660?'夜明けを見し者':s>=440?'桂川を渡りし者':s>=220?'老ノ坂を越えし者':'亀山の霧に散りし者'; }

  try{ best=parseInt(localStorage.getItem('honnoji_best'))||0; }catch(e){}
  bestEl.textContent='最高 '+best;

  function reset(){
    dist=0; speed=baseSpeed; t=0; shake=0; obstacles=[]; embers=[]; spawnT=.6; pressBuf=-1e9;
    player.x=Math.min(W*0.24,180); player.y=ground; player.vy=0; player.onGround=true; player.legT=0;
    placeIdx=-1; placeTimer=0; placeEl.classList.remove('show');
    if(mist.length===0) for(let i=0;i<(reduce?6:16);i++)
      mist.push({x:Math.random()*W,y:H*(.35+Math.random()*.4),s:8+Math.random()*22,v:20+Math.random()*30,a:.03+Math.random()*.05});
  }
  function start(){ reset(); state='play'; ov.classList.add('hide'); actions.classList.add('hidden'); track('run'); }
  function endRun(clear){
    if(state!=='play') return;
    state=clear?'clear':'over'; shake=clear?0:14;
    const score=Math.floor(dist);
    const newBest=score>best&&score>0;
    best=Math.max(best,score);
    try{ localStorage.setItem('honnoji_best',best); }catch(e){}
    bestEl.textContent='最高 '+best;
    const rk=rankOf(score);
    let text;
    if(clear){
      ttl.textContent='敵は本能寺にあり'; ttl.style.color='#C9A227'; ttl.style.borderColor='#C9A227';
      sub.innerHTML='千歩の夜を、駆け抜けた<br>位階「'+rk+'」';
      btn.textContent='もう一度駆ける';
      text='「本能寺への道」— 千歩を駆け抜け、本能寺に到達。位階「'+rk+'」。\n是非に及ばず、とは言わせない。\n#本能寺の変 #シネマ絵巻 #本能寺への道';
      track('clear');
    }else{
      ttl.textContent='是非に及ばず'; ttl.style.color='#B3402A'; ttl.style.borderColor='#B3402A';
      sub.innerHTML=score+' 歩 進んだ ─ 位階「'+rk+'」<br>'+
        (newBest?'<span style="color:#C9A227">最高記録、更新</span><br>':'')+
        '本能寺まで、あと'+(GOAL-score)+'歩';
      btn.textContent='再び駆ける';
      text='「本能寺への道」— '+score+'歩、夜を駆けて力尽きた。位階「'+rk+'」。\n本能寺まで、あと'+(GOAL-score)+'歩だった。\n#本能寺の変 #シネマ絵巻 #本能寺への道';
      track('over');
    }
    shareX.href='https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(PAGE_URL);
    actions.classList.remove('hidden');
    ov.classList.remove('hide');
    showOdds(clear);
  }

  function jump(){
    if(state==='play'){
      if(player.onGround){ player.vy=JUMP; player.onGround=false; }
      else pressBuf=t;
    }
    else start();
  }
  btn.addEventListener('click',e=>{e.stopPropagation();start();});
  actions.addEventListener('pointerdown',e=>e.stopPropagation());
  actions.addEventListener('click',e=>e.stopPropagation());
  shareX.addEventListener('click',()=>track('share'));
  document.getElementById('ytLink').addEventListener('click',()=>track('youtube'));
  wrap.addEventListener('pointerdown',e=>{e.preventDefault();jump();});
  addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();} });

  function spawn(){
    const kessen=dist>=KESSEN;
    const h=kessen?32+Math.random()*26:26+Math.random()*22;
    obstacles.push({x:W+40,w:16+Math.random()*10,h:h,fire:.0});
  }

  function update(dt){
    t+=dt;
    if(state==='play'){
      speed+=dt*7;
      dist+=speed*dt/26;
      if(dist>=GOAL){ dist=GOAL; endRun(true); }
      // place milestones
      let idx=0; for(let i=0;i<placeAt.length;i++) if(dist>=placeAt[i]) idx=i;
      if(idx!==placeIdx){ placeIdx=idx; placeEl.textContent=places[idx];
        placeEl.classList.add('show'); placeTimer=2.2; }
      if(placeTimer>0){ placeTimer-=dt; if(placeTimer<=0) placeEl.classList.remove('show'); }
      // player physics
      player.vy+=G*dt; player.y+=player.vy*dt;
      if(player.y>=ground){ player.y=ground; player.vy=0; player.onGround=true;
        if(t-pressBuf<=0.12){ pressBuf=-1e9; player.vy=JUMP; player.onGround=false; } }
      if(player.onGround) player.legT+=dt*speed*0.03;
      // obstacles
      spawnT-=dt;
      if(spawnT<=0){ spawn();
        spawnT = dist>=KESSEN ? .60+Math.random()*.25
                              : Math.max(.62,1.35-speed*0.0011)+Math.random()*.35; }
      for(const o of obstacles){ o.x-=speed*dt; o.fire=Math.min(1,o.fire+dt*4); }
      obstacles=obstacles.filter(o=>o.x+o.w>-20);
      // collision (forgiving AABB)
      const px=player.x-player.r*0.6, pw=player.r*1.2,
            py=player.y-player.r*1.7, ph=player.r*1.7;
      for(const o of obstacles){
        const ox=o.x, oy=ground-o.h;
        if(px<ox+o.w-3 && px+pw>ox+3 && py+ph>oy+4){ endRun(false); break; }
      }
      // embers from nearest brazier
      if(!reduce) for(const o of obstacles){
        if(o.x>-20&&o.x<W&&Math.random()<0.5)
          embers.push({x:o.x+o.w/2,y:ground-o.h,vx:-speed*.3+(Math.random()-.5)*30,
            vy:-40-Math.random()*60,life:1,r:1+Math.random()*2});
      }
    }
    if(shake>0) shake=Math.max(0,shake-dt*40);
    // ambient
    for(const m of mist){ m.x-=m.v*dt*(state==='play'?1.6:.5); if(m.x<-60){m.x=W+40;m.y=H*(.35+Math.random()*.4);} }
    for(const e of embers){ e.x+=e.vx*dt; e.y+=e.vy*dt; e.vy+=90*dt; e.life-=dt*1.1; }
    embers=embers.filter(e=>e.life>0);
  }

  function draw(){
    ctx.save();
    if(shake>0) ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
    // sky
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0b0a0d'); g.addColorStop(.55,'#141019'); g.addColorStop(1,'#1a1512');
    ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
    // 本能寺 fire glow far right(近づくほど強く・大きく)
    const prog=Math.min(1,dist/GOAL);
    const fg=ctx.createRadialGradient(W*0.9,ground,10,W*0.9,ground,W*(0.45+0.35*prog));
    fg.addColorStop(0,'rgba(179,64,42,'+(0.3+0.42*prog).toFixed(2)+')'); fg.addColorStop(1,'rgba(179,64,42,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
    // crescent moon (三日月)
    const mx=W*0.82,my=H*0.2,mr=Math.min(W,H)*0.075;
    ctx.save(); ctx.fillStyle='#C9A227'; ctx.shadowColor='rgba(201,162,39,.6)'; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.arc(mx,my,mr,0,7); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#0f0c14';
    ctx.beginPath(); ctx.arc(mx+mr*0.42,my-mr*0.28,mr*0.95,0,7); ctx.fill(); ctx.restore();
    // mountains (parallax layers)
    function ridge(base,amp,col,seed){ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,H);
      for(let x=0;x<=W;x+=40){ const y=base+Math.sin(x*0.008+seed)*amp+Math.sin(x*0.021+seed*2)*amp*0.4; ctx.lineTo(x,y);}
      ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); }
    ridge(H*0.5,26,'#181420',1.2); ridge(H*0.6,34,'#211a24',3.1);
    // mist
    for(const m of mist){ ctx.fillStyle='rgba(232,223,200,'+m.a+')'; ctx.beginPath();
      ctx.ellipse(m.x,m.y,m.s*2.4,m.s,0,0,7); ctx.fill(); }
    // ground
    ctx.fillStyle='#0a0908'; ctx.fillRect(-20,ground,W+40,H-ground+20);
    ctx.strokeStyle='rgba(201,162,39,.22)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,ground+.5); ctx.lineTo(W,ground+.5); ctx.stroke();
    // 本能寺(940歩から地平に現れる)
    const ap=(dist-940)/(GOAL-940);
    if(ap>0) drawTemple(W-Math.min(1,ap)*W*0.24,ground);
    // braziers (obstacles)
    for(const o of obstacles){ const ox=o.x, oy=ground-o.h;
      ctx.fillStyle='#0a0908'; ctx.fillRect(ox,oy,o.w,o.h);           // post
      ctx.fillStyle='#1c150d'; ctx.fillRect(ox-3,oy-4,o.w+6,6);        // basket
      const fh=12+Math.sin(t*12+ox)*3;
      const fgr=ctx.createLinearGradient(0,oy-fh,0,oy);
      fgr.addColorStop(0,'rgba(201,162,39,.95)'); fgr.addColorStop(.6,'rgba(179,64,42,.9)'); fgr.addColorStop(1,'rgba(179,64,42,.2)');
      ctx.fillStyle=fgr; ctx.beginPath(); ctx.moveTo(ox-2,oy-2);
      ctx.quadraticCurveTo(ox+o.w/2,oy-fh-6,ox+o.w+2,oy-2); ctx.closePath(); ctx.fill();
    }
    // embers
    for(const e of embers){ ctx.fillStyle='rgba(201,162,39,'+Math.max(0,e.life)+')';
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,7); ctx.fill(); }
    // player (samurai silhouette)
    drawSamurai(player.x,player.y);
    ctx.restore();
    distEl.firstChild.textContent=Math.floor(dist)+' ';
  }

  function drawTemple(x,gy){
    ctx.save();
    const w=Math.min(W*0.5,230), h=w*0.6;
    // 炎の照り
    const gl=ctx.createRadialGradient(x+w/2,gy-h*0.5,10,x+w/2,gy-h*0.5,w*1.2);
    gl.addColorStop(0,'rgba(201,120,40,.35)'); gl.addColorStop(1,'rgba(179,64,42,0)');
    ctx.fillStyle=gl; ctx.fillRect(x-w,gy-h*2.4,w*3,h*2.6);
    // 大屋根(反りのある寺屋根)
    ctx.fillStyle='#0a0806';
    ctx.beginPath();
    ctx.moveTo(x-w*0.12,gy-h*0.52);
    ctx.quadraticCurveTo(x+w*0.5,gy-h*1.15,x+w*1.12,gy-h*0.52);
    ctx.lineTo(x+w*0.94,gy-h*0.44);
    ctx.quadraticCurveTo(x+w*0.5,gy-h*0.82,x+w*0.06,gy-h*0.44);
    ctx.closePath(); ctx.fill();
    // 壁
    ctx.fillRect(x+w*0.1,gy-h*0.46,w*0.8,h*0.46);
    // 火の入った格子窓
    ctx.fillStyle='rgba(201,120,40,.55)';
    for(let i=0;i<4;i++) ctx.fillRect(x+w*(0.16+i*0.2),gy-h*0.38,w*0.06,h*0.3);
    // 屋根の上に揺れる炎
    const f=ctx.createLinearGradient(0,gy-h*1.6,0,gy-h*0.8);
    f.addColorStop(0,'rgba(201,162,39,0)'); f.addColorStop(1,'rgba(201,162,39,.5)');
    ctx.fillStyle=f;
    ctx.beginPath();
    ctx.moveTo(x+w*0.15,gy-h*0.78);
    ctx.quadraticCurveTo(x+w*0.33,gy-h*1.5+Math.sin(t*9)*6,x+w*0.5,gy-h*0.88);
    ctx.quadraticCurveTo(x+w*0.68,gy-h*1.6+Math.cos(t*8)*6,x+w*0.85,gy-h*0.78);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawSamurai(x,y){
    const r=player.r, run=player.onGround?Math.sin(player.legT):0.2, air=!player.onGround;
    ctx.save(); ctx.translate(x,y);
    // rim light
    ctx.fillStyle='#050404'; ctx.strokeStyle='rgba(201,162,39,.35)'; ctx.lineWidth=1.4;
    // legs
    ctx.lineWidth=6; ctx.strokeStyle='#070605'; ctx.lineCap='round';
    const l1=air?10:run*12, l2=air?-8:-run*12;
    ctx.beginPath(); ctx.moveTo(-2,-r*0.5); ctx.lineTo(-2+l1,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2,-r*0.5); ctx.lineTo(2+l2,0); ctx.stroke();
    // body (hakama + torso)
    ctx.fillStyle='#070605'; ctx.beginPath();
    ctx.moveTo(-r*0.5,-r*1.7); ctx.lineTo(r*0.5,-r*1.7);
    ctx.lineTo(r*0.62,-r*0.5); ctx.lineTo(-r*0.62,-r*0.5); ctx.closePath(); ctx.fill();
    // sword on back
    ctx.strokeStyle='#2a2018'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-r*0.3,-r*1.5); ctx.lineTo(-r*1.0,-r*2.3); ctx.stroke();
    ctx.strokeStyle='#C9A227'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(-r*0.5,-r*1.7); ctx.lineTo(-r*0.68,-r*1.95); ctx.stroke();
    // head + topknot
    ctx.fillStyle='#070605'; ctx.beginPath(); ctx.arc(0,-r*2.0,r*0.42,0,7); ctx.fill();
    ctx.fillRect(-r*0.14,-r*2.65,r*0.28,r*0.4);
    // rim highlight down the back
    ctx.strokeStyle='rgba(201,162,39,.28)'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(r*0.5,-r*1.7); ctx.lineTo(r*0.62,-r*0.5); ctx.stroke();
    ctx.restore();
  }

  let last=0, raf;
  function frame(ts){
    raf=requestAnimationFrame(frame);
    if(!last) last=ts;
    let dt=(ts-last)/1000; last=ts; dt=Math.min(dt,0.05);
    update(dt); draw();
  }
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){ cancelAnimationFrame(raf); raf=0; last=0; }
    else if(!raf) raf=requestAnimationFrame(frame);
  });

  setup(); reset();
  raf=requestAnimationFrame(frame);
})();
</script>
</body>
</html>
